<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NN Salades</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background:#f5fff5;
    padding:20px;
}

.logo {
    width:150px;
}

h1 {
    color:#1b7d2b;
}

button {
    width:90%;

    padding:15px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:18px;

}

    margin-top:20px;

<body>

<h1>N&N Salades</h1>

<p>Fraîcheur • Équilibre • Énergie</p>

<h3>🥗 Commandez directement</h3>


<button onclick="commande('une salade')">
🥗 Commander une salade
</button>


<button onclick="commande('un jus naturel')">
🥤 Commander un jus
</button>


<button onclick="commande('un gâteau')">
🍩 Commander un gâteau
</button>


<button onclick="commande('une commande complète')">
🍱 Commander un menu complet
</button>


<div class="info">
Préparé avec passion pour votre bien-être ❤️
</div>

<script>

function commande(produit){
let numero="23795074819"; 

    let message =
    "Bonjour N&N Salades 👋%0A"+
    "Je souhaite commander : "+produit;

    let url =
    "https://wa.me/"+numero+"?text="+message;

    window.location.href=url;
}

</script>

</body>
